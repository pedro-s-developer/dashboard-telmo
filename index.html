*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F7F8FA;--w:#FFF;--b:#D8DEE9;--bs:#EEF1F6;--t:#0F1724;--t2:#2D3A4E;--t3:#56657A;--t4:#8899AA;--blue:#1877F2;--blu:#EAF1FF;--grn:#00934a;--grb:#E6F5EE;--ylw:#E08C00;--ylb:#FFF6E0;--tel:#0077A8;--tlb:#E0F4FA;--pur:#7B2FBE;--pub:#F3EAFF;}
body{background:var(--bg);color:var(--t);font-family:'Poppins',sans-serif;padding:16px 14px}
.pg{max-width:1180px;margin:0 auto}
/* Action bar */
.act-bar{display:flex;gap:8px;margin-bottom:14px}
.act-btn{font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;padding:7px 14px;border-radius:8px;border:1.5px solid var(--b);background:var(--w);color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.act-btn.pri{background:var(--t);border-color:var(--t);color:#fff}
.drop{position:relative;display:inline-block}
.drop-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--w);border:1.5px solid var(--b);border-radius:8px;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:100;overflow:hidden}

.drop-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Poppins',sans-serif;white-space:nowrap}
.drop-item:hover{background:var(--bs)}
/* View toggle */
.view-rep{display:none}.view-rep.on{display:block}
/* Dashboard */
.hdr{padding-bottom:12px;border-bottom:1px solid var(--b);margin-bottom:14px}
.ey{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--t4)}
.ey b{color:#1877F2}
h1{font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:1;margin:5px 0 3px}
.hm{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.hbadge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;border:1px solid rgba(15,23,36,.15);background:var(--w);border-radius:6px;padding:5px 10px;margin-top:8px}
.sec{display:flex;align-items:center;gap:10px;padding-top:6px;margin:14px 0 10px}
.sec span{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:2px;white-space:nowrap}
.sec hr{flex:1;height:1px;background:var(--b);border:none}
.insight{background:linear-gradient(135deg,#0F1724,#1A2438 50%,#0F1724);border-radius:14px;padding:20px;margin-bottom:14px;color:#fff}
.ins-ey{font-size:9px;font-weight:900;letter-spacing:1.5px;color:rgba(255,255,255,.6);text-transform:uppercase;margin-bottom:10px}
.ins-t{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:12px}
.ins-hl{color:#FFD166}
.ins-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1)}
.is-label{font-size:8px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.is-val{font-weight:900;font-family:'IBM Plex Mono',monospace;font-size:13px}
.kpi-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--w);border:1px solid var(--b);border-radius:12px;padding:14px}
.kpi-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t4);margin-bottom:8px}
.kpi-v{font-size:22px;font-weight:900;line-height:1;letter-spacing:-.5px;margin-bottom:4px}
.kpi-s{font-size:10px;color:var(--t3)}
.gc{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:14px}
.gc-card{background:var(--w);border:1px solid var(--b);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
.gc-bar{position:absolute;top:0;left:0;right:0;height:3px}
.gc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.gc-title{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px}
.gc-invest{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;border:1px solid var(--b);border-radius:5px;padding:3px 7px}
.gc-main{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.gc-num{font-size:26px;font-weight:900;line-height:1;margin-bottom:2px}

.gc-sv{font-size:11px;font-weight:900;font-family:'IBM Plex Mono',monospace}
.gc-sl{font-size:8px;color:var(--t3);margin-top:2px}
.pie-wrap{background:var(--w);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:14px}
.pie-title{font-size:13px;font-weight:800;margin-bottom:2px}
.pie-sub{font-size:10px;color:var(--t3);margin-bottom:12px}
.pie-lg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;text-align:center}
.pl-lbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.pl-v{font-size:11px;font-weight:900;font-family:'IBM Plex Mono',monospace}
.pl-p{font-size:9px;color:var(--t4);font-family:'IBM Plex Mono',monospace}
.tl{display:flex;background:var(--w);border:1px solid var(--b);padding:3px;border-radius:10px;gap:2px;margin-bottom:12px;overflow-x:auto}
.tb{flex:1;min-width:fit-content;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;padding:7px 10px;border-radius:7px;border:none;background:transparent;color:var(--t2);cursor:pointer;white-space:nowrap}
.tb.on{background:var(--blue);color:#fff}
.tc{display:none}.tc.on{display:block}
.cg-sect{margin-bottom:14px}
.cg-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.badge{font-size:9px;font-weight:900;letter-spacing:1px;padding:3px 8px;border-radius:5px;text-transform:uppercase}

.cg-stitle{font-size:12px;font-weight:800}.cg-sub{font-size:9px;color:var(--t3);font-family:'IBM Plex Mono',monospace;margin-left:auto}

.cr-name{font-size:12px;font-weight:700;margin-bottom:4px}
.cr-bar{height:4px;background:var(--bs);border-radius:2px;overflow:hidden;margin:5px 0}
.cr-fill{height:100%;border-radius:2px}
.cr-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:5px}
.cs-lbl{font-size:8px;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.cs-v{font-size:13px;font-weight:900;font-family:'IBM Plex Mono',monospace}
.dr{padding:9px 0;border-bottom:1px solid var(--bs)}.dr:last-child{border-bottom:none}

.dr-fill{height:100%;border-radius:2px;background:var(--pur)}

.ds-v{font-size:11px;font-weight:900;font-family:'IBM Plex Mono',monospace}

.fn-so{font-size:8px;color:var(--t4)}

.rep strong{font-weight:700;color:var(--t)}

.rep-pbar{display:flex;gap:8px;margin-top:28px;padding-top:16px;border-top:1px solid var(--b)}

  .rep h1{font-size:28px}

@media print{
  .act-bar,.rep-pbar{display:none!important}
  #viewDash{display:none!important}
  .view-rep{display:block!important}

  .rep{max-width:100%}

  relatorio:`<h2>Sumário Executivo</h2>

<h2>Resultados por Frente</h2>

<h3>Aparelho Invisível — Fundo MSG</h3>

<h3>Estética / Botox — Fundo MSG</h3>
